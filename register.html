<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusFest | Event Registration</title>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js"></script>
</head>

<body>

    <div class="sidebar">
        <div class="sidebar-logo">
            <i class="fas fa-bolt"></i>
            <span>CampusFest</span>
        </div>
        
        <nav>
            <a href="dashboard.html"><i class="fas fa-home"></i> <span>Overview</span></a>
            <a href="activities.html"><i class="fas fa-calendar-alt"></i> <span>Activities</span></a>
            <a href="schedule.html"><i class="fas fa-clock"></i> <span>Schedule</span></a>
            <a href="announcements.html"><i class="fas fa-bullhorn"></i> <span>Announcements</span></a>
            <a href="scoreboard.html"><i class="fas fa-trophy"></i> <span>Scoreboard</span></a>
            <a href="#" onclick="logout()" class="logout"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></a>
        </nav>
    </div>

    <div class="main animate">
        <h1>Event Registration</h1>
        <p style="margin-bottom: 30px; color: var(--text-dim);">Complete the form below to participate in the festival events.</p>

        <div class="form-container">
            <div class="form-group">
                <label>Student Full Name</label>
                <input id="regName" type="text" placeholder="Enter your name">
            </div>

            <div class="form-group">
                <label>Enrollment Number</label>
                <input id="regEnrollment" type="text" placeholder="Enter enrollment number">
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input id="regPhone" type="tel" placeholder="Enter phone number">
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input id="regEmail" type="email" placeholder="Enter email address">
            </div>

            <div class="form-group">
                <label>Select House</label>
                <select id="regHouse">
                    <option value="" disabled selected>Select your house</option>
                    <option value="Agni">🔥 Agni</option>
                    <option value="Vayu">🌪 Vayu</option>
                    <option value="Jal">💧 Jal</option>
                    <option value="Prithvi">🌍 Prithvi</option>
                    <option value="Antriksh">🚀 Antriksh</option>
                </select>
            </div>

            <div class="form-group">
                <label>Selected Event</label>
                <input id="eventField" type="text" readonly style="background: #f8fafc; cursor: not-allowed;">
            </div>

            <button onclick="submitRegistration()">
                Submit Registration <i class="fas fa-check-circle" style="margin-left: 8px;"></i>
            </button>
        </div>
    </div>

</body>
</html>
