<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusFest | Portal Login</title>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js"></script>
</head>

<body class="login-body">

    <div class="login-card animate">
        <div class="sidebar-logo" style="justify-content: center; margin-bottom: 10px;">
            <i class="fas fa-bolt"></i>
            <span>CampusFest</span>
        </div>
        <h1>Welcome Back</h1>
        <p>Login to access your festival dashboard</p>

        <div class="form-group" style="text-align: left;">
            <input id="loginEmail" type="email" placeholder="College Email">
            <input id="loginPassword" type="password" placeholder="Password">
        </div>

        <button onclick="login()">
            Sign In <i class="fas fa-arrow-right" style="margin-left: 8px;"></i>
        </button>

        <p style="margin-top: 20px; font-size: 0.85rem;">
            Don't have an account? <a href="#" onclick="toggleAuth()" style="color: var(--primary); text-decoration: none;">Sign Up</a>
        </p>
    </div>

</body>
</html>
